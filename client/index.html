<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow AI — Smart Project Management</title>
    <meta name="description" content="AI-powered task and project management. Kanban boards, Gemini AI estimates, analytics dashboard." />

    <!--
      Anti-flash theme script — runs synchronously before any CSS or JS loads.
      Reads localStorage and applies the correct class to <html> immediately.
    -->
    <script>
      (function () {
        var theme = localStorage.getItem('tf_theme') || 'light';
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
